          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "100 * (1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))",
              "legendFormat": "Cluster CPU used",
              "refId": "A",
              "instant": true,
              "range": false
