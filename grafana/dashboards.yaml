        {
          "type": "table",
          "title": "Top pods by CPU (cores)",
          "datasource": {
            "type": "prometheus",
            "uid": "prometheus"
          },
          "id": 19,
          "gridPos": {
            "h": 9,
            "w": 8,
            "x": 0,
            "y": 37
          },
          "targets": [
            {
              "datasource": {
                "type": "prometheus",
                "uid": "prometheus"
              },
              "expr": "topk(10, sum by(namespace,pod)(rate(container_cpu_usage_seconds_total{container!=\"\"}[5m])))",
              "refId": "A",
              "instant": true,
              "range": false,
              "format": "table"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "align": "auto",
                "filterable": true
              }
            },
            "overrides": [
              {
                "matcher": {
                  "id": "byName",
                  "options": "value"
                },
                "properties": [
                  {
                    "id": "custom.width",
                    "value": 130
                  }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "sortBy": [
              {
                "displayName": "value",
                "desc": true
              }
            ],
            "footer": {
              "show": false
            }
          },
          "transformations": [
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true
                },
                "indexByName": {
                  "namespace": 0,
                  "pod": 1,
                  "Value": 2
                },
                "renameByName": {
                  "Value": "value"
                }
              }
            }
          ]
        },
        {
