apiVersion: v1
kind: ConfigMap
metadata:
  name: gbrain-psql-init
  namespace: gbrain
data:
  01_extensions.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gbrain-psql
  namespace: gbrain
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: gbrain-psql
  template:
    metadata:
      labels:
        app: gbrain-psql
    spec:
      # Pin to server-master: the psql PV is a local hostPath on that node.
      nodeSelector:
        kubernetes.io/hostname: server-master
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: role
                    operator: In
                    values:
                      - master
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: gbrain-secrets
                  key: postgres-user
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: gbrain-secrets
                  key: postgres-db
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: gbrain-secrets
                  key: postgres-password
            # Keep PGDATA in a subdir so a hostPath root with stray files is fine.
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d
              readOnly: true
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "gbrain", "-d", "gbrain"]
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: gbrain-psql-pvc
        - name: init-sql
          configMap:
            name: gbrain-psql-init
---
apiVersion: v1
kind: Service
metadata:
  name: gbrain-psql
  namespace: gbrain
spec:
  type: ClusterIP
  selector:
    app: gbrain-psql
  ports:
    - port: 5432
      targetPort: 5432
