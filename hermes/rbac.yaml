# Gives the hermes agent pod kubectl access scoped to the hermes and gbrain
# namespaces only. Roles (not ClusterRoles) mean cluster-scoped resources —
# PersistentVolumes, Namespaces, CRDs, nodes — stay off limits, so applying
# volume.yaml/namespace.yaml from inside the pod will be Forbidden by design.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hermes-agent
  namespace: hermes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-agent-full
  namespace: hermes
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-agent-full
  namespace: hermes
subjects:
  - kind: ServiceAccount
    name: hermes-agent
    namespace: hermes
roleRef:
  kind: Role
  name: hermes-agent-full
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hermes-agent-full
  namespace: gbrain
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hermes-agent-full
  namespace: gbrain
subjects:
  - kind: ServiceAccount
    name: hermes-agent
    namespace: hermes
roleRef:
  kind: Role
  name: hermes-agent-full
  apiGroup: rbac.authorization.k8s.io
