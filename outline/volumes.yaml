apiVersion: v1
kind: PersistentVolume
metadata:
  name: outline-nfs-pv-https-portal
  namespace: outline
spec:
  capacity:
    storage: 30Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  local:
    path: /srv/data/outline/https-portal
  storageClassName: outline-data
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - server-master
---
