apiVersion: v1
kind: PersistentVolume
metadata:
  name: kratos-psql-pv
  namespace: kratos
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  local:
    path: /srv/data/kratos
  storageClassName: kratos-psql
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - server-master
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: kratos-psql-pvc
  namespace: kratos
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
  volumeName: kratos-psql-pv
  storageClassName: kratos-psql
