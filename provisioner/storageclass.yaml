# "local" StorageClass backed by the k3s built-in local-path-provisioner
# (provisioner rancher.io/local-path, runs in kube-system).
#
# Dynamic, node-local volumes. With WaitForFirstConsumer the PV is created on
# whichever node the consuming pod is scheduled to, under the built-in's path
# /var/lib/rancher/k3s/storage/. allowedTopologies pins provisioning to
# server-master, so consuming pods are forced there and their data stays on
# master's local disk.
#
# reclaimPolicy: Retain matches the migration runbook's "never auto-delete
# data" stance. Trade-off: deleting a PVC leaves an orphaned Released PV + its
# on-disk dir to clean up by hand. Switch to Delete if you'd rather PVC
# deletion rm the data.
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: local
provisioner: rancher.io/local-path
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain
allowedTopologies:
- matchLabelExpressions:
  - key: kubernetes.io/hostname
    values:
    - server-master
