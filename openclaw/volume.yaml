apiVersion: v1
kind: PersistentVolume
metadata:
  name: openclaw-pv
  namespace: openclaw
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  nfs:
    path: /srv/openclaw
    server: 192.168.86.100
  storageClassName: openclaw-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: openclaw-pvc
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  volumeName: openclaw-pv
  storageClassName: openclaw-data
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: host-home-pv
spec:
  capacity:
    storage: 100Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  hostPath:
    path: /home/prayuj
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: host-home-pvc
  namespace: openclaw
spec:
  accessModes:
    - ReadWriteMany
  volumeName: host-home-pv
  storageClassName: local-storage
  resources:
    requests:
      storage: 100Gi
