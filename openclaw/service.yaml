apiVersion: v1
kind: Service
metadata:
  name: openclaw-service
  namespace: openclaw
spec:
  type: NodePort
  selector:
    app: openclaw
  ports:
    - name: gateway
      protocol: TCP
      port: 18789
      targetPort: 18789
      nodePort: 31789
    - name: browser
      protocol: TCP
      port: 18791
      targetPort: 18791
      nodePort: 31791
