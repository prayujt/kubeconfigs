apiVersion: v1
kind: ServiceAccount
metadata:
  name: openclaw-sa
  namespace: openclaw
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openclaw-admin-binding
subjects:
- kind: ServiceAccount
  name: openclaw-sa
  namespace: openclaw
roleRef:
  kind: ClusterRole
  name: edit
  apiGroup: rbac.authorization.k8s.io
