apiVersion: v1
kind: PersistentVolume
metadata:
  name: nimbus-db-pv
  namespace: nimbus
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  local:
    path: /srv/nimbus/db
  storageClassName: nimbus-db
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - server-master
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nimbus-db-pvc
  namespace: nimbus
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
  volumeName: nimbus-db-pv
  storageClassName: nimbus-db
